<html lang="en">

    <meta charset="UTF-8" />

    <!-- Warm up TLS to the API + Supabase so the first data fetch is faster. -->
    <link rel="preconnect" href="https://ibis-backend-svno.onrender.com" crossorigin />
    <link rel="preconnect" href="https://bkyfkkujcohsnmidkaji.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://ibis-backend-svno.onrender.com" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
